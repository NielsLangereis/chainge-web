<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Newsreader, Georgia, serif">
  <!-- background -->
  <rect width="1200" height="630" fill="#F4EFE6"/>

  <!-- subtle grain -->
  <defs>
    <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="rgba(21,19,15,0.06)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- top meta strip -->
  <line x1="80" y1="64" x2="1120" y2="64" stroke="#15130F" stroke-width="1"/>
  <line x1="80" y1="94" x2="1120" y2="94" stroke="#C9C2B6" stroke-width="1"/>
  <circle cx="92" cy="79" r="4" fill="#2D5C47"/>
  <text x="108" y="83" font-family="IBM Plex Mono, monospace" font-size="13" fill="#847866" letter-spacing="1px">CHAINGE / RESEARCH PREVIEW · 2026</text>
  <text x="1120" y="83" font-family="IBM Plex Mono, monospace" font-size="13" fill="#847866" letter-spacing="1px" text-anchor="end">CHAINGE.GLOBAL</text>

  <!-- wordmark -->
  <text x="80" y="220" font-size="80" fill="#15130F" letter-spacing="-2">
    <tspan font-weight="300" font-style="italic">chai</tspan><tspan font-weight="500">nge</tspan>
  </text>

  <!-- main claim -->
  <text x="80" y="340" font-size="64" fill="#15130F" letter-spacing="-1.5">From the headline to your</text>
  <text x="80" y="416" font-size="64" fill="#15130F" letter-spacing="-1.5"><tspan font-style="italic" font-weight="300" fill="#2D5C47">bottom line</tspan>, in six steps.</text>

  <!-- tagline -->
  <text x="80" y="490" font-family="IBM Plex Mono, monospace" font-size="18" fill="#847866" letter-spacing="0.8px">CROSS-DOMAIN CASCADE ANALYSIS · EVERY CLAIM CITED</text>

  <!-- weak-tie chain visual on right side -->
  <g>
    <!-- chain path -->
    <path d="M 880 180 C 940 200, 980 220, 1020 250 C 1060 280, 1080 340, 1080 400 C 1080 440, 1050 470, 1000 480" fill="none" stroke="#2D5C47" stroke-width="2.5"/>

    <!-- weak tie scaffolding -->
    <path d="M 880 540 C 920 530, 960 510, 1000 480" fill="none" stroke="#15130F" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.4"/>
    <path d="M 1100 540 C 1080 520, 1070 500, 1000 480" fill="none" stroke="#15130F" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.4"/>
    <path d="M 800 240 C 830 220, 870 200, 880 180" fill="none" stroke="#15130F" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.4"/>

    <!-- nodes -->
    <circle cx="880" cy="180" r="9" fill="#F4EFE6" stroke="#2D5C47" stroke-width="2"/>
    <circle cx="1020" cy="250" r="7" fill="#F4EFE6" stroke="#2D5C47" stroke-width="2"/>
    <circle cx="1080" cy="400" r="7" fill="#F4EFE6" stroke="#2D5C47" stroke-width="2"/>
    <circle cx="1000" cy="480" r="11" fill="#2D5C47" stroke="#2D5C47" stroke-width="2"/>

    <!-- background nodes -->
    <circle cx="800" cy="240" r="3" fill="#15130F"/>
    <circle cx="880" cy="540" r="3" fill="#15130F"/>
    <circle cx="1100" cy="540" r="3" fill="#15130F"/>
  </g>

  <!-- bottom strip -->
  <line x1="80" y1="566" x2="1120" y2="566" stroke="#15130F" stroke-width="1"/>
  <text x="80" y="595" font-family="IBM Plex Mono, monospace" font-size="13" fill="#847866" letter-spacing="0.8px">THE QUALITATIVE QUANT · ELITE FORESIGHT, DEMOCRATIZED</text>
  <text x="1120" y="595" font-family="IBM Plex Mono, monospace" font-size="13" fill="#847866" letter-spacing="0.8px" text-anchor="end">→ TALK TO US</text>
</svg>
